<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IKAPAY MALI PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --main: #1db954; --bg: #0b0b0b; --card: #1a1a1a; --gold: #fcd116; --blue: #2196F3; --red: #ff4444; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; padding-bottom: 80px; }
        .card { background: var(--card); border-radius: 18px; padding: 15px; margin-bottom: 12px; border: 1px solid #333; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid #444; background: #222; color: white; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        .btn-main { background: var(--main); color: white; }
        .btn-pro { background: var(--gold); color: black; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-red { background: var(--red); color: white; }
        .solde-amt { font-size: 32px; font-weight: 800; color: var(--main); text-align: center; }
        .hidden { display: none !important; }
        .hist-item { font-size: 12px; padding: 10px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-btn { font-size: 20px; color: gray; }
        .active { color: var(--main); }
        .badge { font-size: 10px; background: var(--gold); color: black; padding: 2px 6px; border-radius: 5px; text-transform: uppercase; }
        .grid-services { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

    <div id="auth-box" class="card" style="margin-top: 10%;">
        <h2 style="text-align:center; color:var(--main);">IKAPAY 🇲🇱</h2>
        <input type="tel" id="u-phone" value="+223" placeholder="Numéro">
        <input type="password" id="u-pin" placeholder="PIN">
        <select id="u-role">
            <option value="user">👤 Client Simple</option>
            <option value="agent">🏪 Agent IKAPAY</option>
            <option value="chauffeur">🚕 Chauffeur</option>
            <option value="boutique">🛍️ Boutique</option>
            <option value="grossiste">📦 Grossiste</option>
            <option value="restaurant">🍱 Restaurant</option>
        </select>
        <button class="btn-main" onclick="accessApp()">CONNEXION</button>
    </div>

    <div id="app-box" class="hidden">
        
        <div id="admin-tools" class="card hidden" style="border: 2px solid var(--red);">
            <b style="color:var(--red);">🛡️ ADMIN CONTROL</b>
            <input type="tel" id="adm-target" placeholder="Numéro">
            <input type="number" id="adm-amt" placeholder="Montant">
            <button class="btn-red" onclick="adminMint()">INJECTER MONNAIE</button>
        </div>

        <div class="card">
            <div style="text-align:center;"><b id="disp-name">...</b> <span id="disp-role" class="badge"></span></div>
            <div class="solde-amt" id="disp-solde">0 CFA</div>
        </div>

        <div id="tab-home">
            <div id="pro-tools" class="card hidden">
                <h3 style="color:var(--gold); margin:0 0 10px 0;">💼 Espace Professionnel</h3>
                <input type="tel" id="pro-target" placeholder="Numéro Client">
                <input type="number" id="pro-val" placeholder="Montant CFA">
                
                <div id="agent-actions" class="hidden">
                    <div style="display:flex; gap:5px;">
                        <button class="btn-main" style="flex:1;" onclick="proAction('DEPOT')">FAIRE DÉPÔT</button>
                        <button class="btn-pro" style="flex:1;" onclick="proAction('ENCAISSER')">ENCAISSER CASH</button>
                    </div>
                </div>

                <div id="commerce-actions" class="hidden">
                    <div style="display:flex; gap:5px;">
                        <button class="btn-pro" style="flex:1;" onclick="addDebt()">NOTER DETTE</button>
                        <button class="btn-blue" style="flex:1;" onclick="postStock()">PUB STOCK</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>🛠️ Services Rapides (IkaChat)</h3>
                <div class="grid-services">
                    <button class="btn-pro" onclick="reqService('TAXI')">🚕 Taxi / Moto</button>
                    <button class="btn-main" onclick="reqService('EAT')">🥘 IkaEat</button>
                    <button class="btn-blue" onclick="reqService('ELEC')">⚡ Électricien</button>
                    <button class="btn-blue" onclick="reqService('PLOMB')">🔧 Plombier</button>
                </div>
            </div>

            <div class="card">
                <h3>💸 Envoyer Argent</h3>
                <input type="tel" id="send-tel" placeholder="Destinataire">
                <input type="number" id="send-amt" placeholder="Montant">
                <button class="btn-main" onclick="sendMoney()">VALIDER L'ENVOI</button>
            </div>
        </div>

        <div id="tab-hist" class="hidden">
            <div class="card"><h3>📜 Historique</h3><div id="hist-list"></div></div>
        </div>

        <div id="tab-chat" class="hidden">
            <div class="card">
                <h3>💬 IkaChat 🇲🇱 (Réseau Pro)</h3>
                <div id="chat-msgs" style="height:350px; overflow-y:auto; background:#222; padding:10px; border-radius:10px;"></div>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <input type="text" id="chat-input" placeholder="Annonce ou message...">
                    <button class="btn-main" style="width:70px;" onclick="sendChatMsg()">OK</button>
                </div>
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-btn active" id="n-h" onclick="showTab('home')">🏠</div>
            <div class="nav-btn" id="n-hi" onclick="showTab('hist')">📜</div>
            <div class="nav-btn" id="n-c" onclick="showTab('chat')">💬</div>
            <div class="nav-btn" onclick="location.reload()">🚪</div>
        </div>
    </div>

<script>
// CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyAzhSslKnrPOsgmxtR8OTqv__QCR-5geSU",
    authDomain: "malicoin.firebaseapp.com",
    databaseURL: "https://malicoin-default-rtdb.firebaseio.com",
    projectId: "malicoin",
    storageBucket: "malicoin.firebasestorage.app",
    appId: "1:728024400418:web:45616567fc3aa9e02a007b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const ADMINS = ["+22396804164", "+22377597001", "+22376022912", "+22376831895"];
let me = null, myPhone = "";

function accessApp() {
    myPhone = document.getElementById('u-phone').value.trim();
    const pin = document.getElementById('u-pin').value.trim();
    const role = document.getElementById('u-role').value;

    db.ref('users/' + myPhone).once('value', s => {
        if(s.exists()){ launch(myPhone, s.val()); } 
        else {
            const newUser = { role: role, solde: 0, pin: pin };
            db.ref('users/' + myPhone).set(newUser).then(() => launch(myPhone, newUser));
        }
    });
}

function launch(phone, data) {
    me = data;
    document.getElementById('auth-box').classList.add('hidden');
    document.getElementById('app-box').classList.remove('hidden');
    document.getElementById('disp-name').innerText = phone;
    document.getElementById('disp-role').innerText = me.role;

    if(ADMINS.includes(phone)) document.getElementById('admin-tools').classList.remove('hidden');

    if(['agent', 'boutique', 'grossiste', 'restaurant'].includes(me.role)) {
        document.getElementById('pro-tools').classList.remove('hidden');
        if(me.role === 'agent') document.getElementById('agent-actions').classList.remove('hidden');
        else document.getElementById('commerce-actions').classList.remove('hidden');
    }

    db.ref('users/'+phone+'/solde').on('value', s => {
        document.getElementById('disp-solde').innerText = (s.val()||0).toLocaleString() + " CFA";
        me.solde = s.val()||0;
    });

    loadChat(); loadHist();
}

// LOGIQUE AGENT
function proAction(type) {
    const target = document.getElementById('pro-target').value;
    const amt = parseInt(document.getElementById('pro-val').value);
    if(!target || !amt) return alert("Remplir les champs");

    if(type === 'DEPOT') {
        if(me.solde < amt) return alert("Solde insuffisant");
        db.ref('users/'+myPhone+'/solde').transaction(s => s - amt);
        db.ref('users/'+target+'/solde').transaction(s => (s||0) + amt);
        logAction(myPhone, "Dépôt vers "+target, -amt);
        logAction(target, "Reçu de l'Agent", amt);
        db.ref('chat').push().set({ u: "IKAPAY", m: `✅ Dépôt réussi de ${amt} F vers ${target}`, t: Date.now() });
        alert("Dépôt effectué !");
    } else {
        // ENCAISSEMENT CASH
        db.ref('chat').push().set({ u: "AGENT", m: `🏧 ENCAISSEMENT : ${target} doit verser ${amt} F cash.`, t: Date.now() });
        alert("Alerte encaissement envoyée !");
    }
    document.getElementById('pro-target').value = ""; document.getElementById('pro-val').value = "";
}

// SERVICES LIÉS AU CHAT
function reqService(srv) {
    const s = {TAXI:"🚕 TAXI/MOTO", EAT:"🥘 IKAEAT", ELEC:"⚡ ÉLECTRICIEN", PLOMB:"🔧 PLOMBIER"};
    db.ref('chat').push().set({ 
        u: myPhone, 
        m: `🚨 DEMANDE : Besoin de [${s[srv]}] immédiatement !`, 
        t: Date.now() 
    });
    alert("Votre demande est sur IkaChat !");
}

function sendChatMsg() {
    const inp = document.getElementById('chat-input');
    if(!inp.value) return;
    db.ref('chat').push().set({ u: myPhone, m: inp.value, t: Date.now() });
    inp.value = "";
}

function loadChat() {
    db.ref('chat').limitToLast(30).on('value', s => {
        const div = document.getElementById('chat-msgs'); div.innerHTML = "";
        s.forEach(c => {
            const v = c.val();
            const isSystem = v.u === "IKAPAY" || v.u === "AGENT";
            div.innerHTML += `<div style="margin-bottom:10px; border-left:2px solid ${isSystem?'var(--main)':'#444'}; padding-left:8px;">
                <b style="color:${isSystem?'var(--main)':'var(--gold)'}">${v.u}</b><br>${v.m}</div>`;
        });
        div.scrollTop = div.scrollHeight;
    });
}

function sendMoney() {
    const to = document.getElementById('send-tel').value;
    const amt = parseInt(document.getElementById('send-amt').value);
    if(me.solde < amt) return alert("Solde insuffisant");
    db.ref('users/'+myPhone+'/solde').transaction(s => s - amt);
    db.ref('users/'+to+'/solde').transaction(s => (s||0) + amt);
    logAction(myPhone, "Envoyé à "+to, -amt);
    logAction(to, "Reçu de "+myPhone, amt);
    document.getElementById('send-tel').value = ""; document.getElementById('send-amt').value = "";
    alert("Envoyé !");
}

function logAction(phone, desc, amt) {
    db.ref('history/'+phone).push().set({ desc, amt, date: new Date().toLocaleString() });
}

function loadHist() {
    db.ref('history/'+myPhone).on('value', s => {
        const l = document.getElementById('hist-list'); l.innerHTML = "";
        s.forEach(c => {
            const h = c.val();
            l.innerHTML = `<div class="hist-item"><span>${h.desc}</span><b style="color:${h.amt>0?'var(--main)':'var(--red)'}">${h.amt} F</b></div>` + l.innerHTML;
        });
    });
}

function showTab(t) {
    document.getElementById('tab-home').classList.toggle('hidden', t !== 'home');
    document.getElementById('tab-hist').classList.toggle('hidden', t !== 'hist');
    document.getElementById('tab-chat').classList.toggle('hidden', t !== 'chat');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('n-'+(t==='home'?'h':t==='hist'?'hi':'c')).classList.add('active');
}

function adminMint() {
    const t = document.getElementById('adm-target').value;
    const a = parseInt(document.getElementById('adm-amt').value);
    db.ref('users/'+t+'/solde').transaction(s => (s||0) + a);
    alert("Injection réussie");
}
</script>
</body>
</html>
