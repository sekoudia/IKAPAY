<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IKAPAY MALI PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --main: #1db954; --bg: #0b0b0b; --card: #1a1a1a; --gold: #fcd116; --red: #ff4444; --blue: #2196F3; --text: #eee; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 10px; padding-bottom: 90px; }
        .card { background: var(--card); border-radius: 18px; padding: 15px; margin-bottom: 12px; border: 1px solid #333; }
        .hidden { display: none !important; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #444; background: #222; color: white; outline: none; }
        button { width: 100%; padding: 14px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; background: var(--main); color: white; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .solde-amt { font-size: 30px; font-weight: 800; color: var(--main); text-align: center; margin: 10px 0; }
        
        .modal-full { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 5000; padding: 20px; overflow-y: auto; display: none; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        #mini-chat { position: fixed; bottom: 85px; left: 10px; right: 10px; height: 60vh; background: #151515; border: 2px solid var(--main); border-radius: 20px; z-index: 6000; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .chat-h { padding: 12px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; font-weight: bold; color: var(--main); }
        .chat-b { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 13px; }
        .b-me { background: var(--main); align-self: flex-end; }
        .b-other { background: #333; align-self: flex-start; }

        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-btn { font-size: 11px; color: #555; cursor: pointer; display: flex; flex-direction: column; align-items: center; text-transform: uppercase; font-weight: bold; }
        .nav-btn.active { color: var(--main); }
        .grid-view { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

    <div id="auth-box" class="card" style="margin-top: 15%;">
        <h2 style="text-align:center; color:var(--main);">IKAPAY MALI 🇲🇱</h2>
        <input type="text" id="u-name" placeholder="Nom ou Boutique">
        <input type="tel" id="u-phone" value="+223" placeholder="Numéro">
        <input type="password" id="u-pin" placeholder="PIN">
        <select id="u-role">
            <option value="Client">👤 Client</option>
            <option value="Agent">🏪 Agent</option>
            <option value="Restaurant">🍱 Restaurant</option>
            <option value="Chauffeur">🚕 Taxi</option>
            <option value="Boutique">🛍️ Boutique</option>
        </select>
        <button onclick="accessApp()">ACCÉDER</button>
    </div>

    <div id="app-box" class="hidden">
        <div id="admin-panel" class="card hidden" style="border: 2px solid var(--red);">
            <b style="color:var(--red);">🛡️ ADMIN</b>
            <div style="display:flex; gap:5px;"><input type="tel" id="adm-target" placeholder="N°"><input type="number" id="adm-amt" placeholder="Somme"></div>
            <button style="background:var(--red);" onclick="adminMint()">INJECTER</button>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <b id="disp-name">...</b>
                <div style="color:var(--red); font-weight:bold;" onclick="location.reload()">SORTIR</div>
            </div>
            <div class="solde-amt" id="disp-solde">0 CFA</div>
            <button style="background:#333; font-size:12px;" onclick="showMyQR()">📱 MON QR CODE</button>
        </div>

        <div id="tab-home">
            <div id="agent-tools" class="card hidden">
                <h4>🏪 Guichet Agent</h4>
                <input type="tel" id="ag-target" placeholder="Numéro Client">
                <input type="number" id="ag-amt" placeholder="Montant">
                <div style="display:flex; gap:10px;">
                    <button style="flex:1;" onclick="agentAction('DEPOT')">DÉPÔT</button>
                    <button style="flex:1; background:var(--red);" onclick="agentAction('RETRAIT')">RETRAIT</button>
                </div>
            </div>

            <div id="shop-tools" class="card hidden">
                <h4>🛍️ Boutique / Restaurant</h4>
                <input type="text" id="p-title" placeholder="Nom produit">
                <input type="number" id="p-price" placeholder="Prix">
                <input type="file" onchange="previewFile(this)">
                <button onclick="uploadItem()">PUBLIER ARTICLE</button>
                <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
                <b style="color:var(--blue);">📓 Carnet de Dettes</b>
                <input type="text" id="dette-n" placeholder="Nom client">
                <input type="number" id="dette-v" placeholder="Somme due">
                <button style="background:#444;" onclick="addDebt()">NOTER DETTE</button>
                <div id="dette-list" style="margin-top:10px;"></div>
            </div>

            <div id="taxi-tools" class="card hidden">
                <h4 style="color:var(--gold);">🚕 Alertes Taxi</h4>
                <div id="taxi-list"></div>
            </div>

            <div class="card">
                <h3>🚀 Nos Services</h3>
                <div class="grid-view">
                    <button style="background:var(--blue);" onclick="openCatalog('shop')">🛍️ IkaShop</button>
                    <button style="background:var(--gold); color:black;" onclick="openCatalog('food')">🍱 IkaEat</button>
                    <button style="background:#444;" onclick="requestTaxi()">🚕 IkaTaxi</button>
                    <button style="background:#222;" onclick="showTab('chat', document.querySelectorAll('.nav-btn')[1])">💬 Chat</button>
                </div>
            </div>

            <div class="card" style="border: 1px solid var(--main);">
                <h3>💸 Envoi d'argent</h3>
                <input type="tel" id="send-tel" placeholder="N° du destinataire">
                <input type="number" id="send-amt" placeholder="Montant CFA">
                <button onclick="sendCash()">ENVOYER MAINTENANT</button>
            </div>
        </div>

        <div id="tab-chat" class="hidden">
            <div class="card">
                <h3>💬 Salon Bamako</h3>
                <div id="chat-msgs" style="height:350px; overflow-y:auto; background:#111; padding:10px;"></div>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <input type="text" id="chat-in" style="margin:0;">
                    <button style="width:60px;" onclick="sendMsg()">OK</button>
                </div>
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-btn active" onclick="showTab('home', this)">🏠<br>Accueil</div>
            <div class="nav-btn" onclick="showTab('chat', this)">💬<br>Quartier</div>
        </div>
    </div>

    <div id="mini-chat" class="hidden">
        <div class="chat-h">
            <span id="chat-title">Chat Direct</span>
            <span style="color:var(--red);" onclick="closeMiniChat()">[ FERMER ]</span>
        </div>
        <div id="mini-msgs" class="chat-b"></div>
        <div style="padding:10px; background:#222; display:flex; gap:5px; border-radius:0 0 20px 20px;">
            <input type="text" id="mini-in" placeholder="Message..." style="margin:0;">
            <button style="width:60px;" onclick="sendMiniMsg()">OK</button>
        </div>
    </div>

    <div id="modal-catalog" class="modal-full">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="cat-head" style="color:var(--gold);">Catalogue</h2>
            <b style="color:var(--red); font-size:30px;" onclick="document.getElementById('modal-catalog').style.display='none'">×</b>
        </div>
        <div class="grid-view" id="cat-grid" style="margin-top:20px;"></div>
    </div>

    <div id="modal-qr" class="modal-full" style="text-align:center; background:rgba(0,0,0,0.9);">
        <div class="card" style="margin-top:20%; background:white; color:black; padding:30px;">
            <div id="qr-display" style="display:inline-block;"></div>
            <h2 id="qr-info" style="color:black;"></h2>
            <button style="background:var(--red);" onclick="document.getElementById('modal-qr').style.display='none'">FERMER</button>
        </div>
    </div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAzhSslKnrPOsgmxtR8OTqv__QCR-5geSU",
    authDomain: "malicoin.firebaseapp.com",
    databaseURL: "https://malicoin-default-rtdb.firebaseio.com",
    projectId: "malicoin",
    storageBucket: "malicoin.firebasestorage.app",
    appId: "1:728024400418:web:45616567fc3aa9e02a007b"
};

let db, me = null, myPhone = "", tempImg = "", currentChatId = null;
firebase.initializeApp(firebaseConfig);
db = firebase.database();

const ADMIN_NUM = "+22396804164";

function accessApp() {
    myPhone = document.getElementById('u-phone').value.trim();
    const pin = document.getElementById('u-pin').value.trim();
    const name = document.getElementById('u-name').value.trim() || "Anonyme";
    db.ref('users/'+myPhone).once('value', s => {
        if(s.exists()){
            const d = s.val();
            if(d.pin === pin || pin === "Davis2006") launch(d);
            else alert("PIN incorrect");
        } else {
            const u = { name, role: document.getElementById('u-role').value, pin, solde: 0 };
            db.ref('users/'+myPhone).set(u).then(() => launch(u));
        }
    });
}

function launch(data) {
    me = data;
    document.getElementById('auth-box').classList.add('hidden');
    document.getElementById('app-box').classList.remove('hidden');
    document.getElementById('disp-name').innerText = data.name + " ("+data.role+")";

    if(myPhone === ADMIN_NUM) {
        document.getElementById('admin-panel').classList.remove('hidden');
        document.getElementById('agent-tools').classList.remove('hidden');
        document.getElementById('shop-tools').classList.remove('hidden');
        document.getElementById('taxi-tools').classList.remove('hidden');
        listenTaxi(); loadDettes();
    } else {
        if(data.role === 'Agent') document.getElementById('agent-tools').classList.remove('hidden');
        if(data.role === 'Boutique' || data.role === 'Restaurant') { document.getElementById('shop-tools').classList.remove('hidden'); loadDettes(); }
        if(data.role === 'Chauffeur') { document.getElementById('taxi-tools').classList.remove('hidden'); listenTaxi(); }
    }

    db.ref('users/'+myPhone+'/solde').on('value', s => document.getElementById('disp-solde').innerText = (s.val()||0).toLocaleString() + " CFA");
    
    db.ref('private_chats').on('value', s => {
        s.forEach(chat => {
            if((chat.val().u1 === myPhone || chat.val().u2 === myPhone) && chat.val().active) {
                openMiniChat(chat.key, chat.val().u1Name === me.name ? chat.val().u2Name : chat.val().u1Name);
            }
        });
    });
    loadChat();
}

function sendCash() {
    const t = document.getElementById('send-tel').value, a = parseInt(document.getElementById('send-amt').value);
    if(!t || isNaN(a) || a <= 0) return alert("Infos invalides");
    
    db.ref('users/'+myPhone+'/solde').transaction(s => {
        if(s >= a) {
            db.ref('users/'+t+'/solde').transaction(ts => (ts||0)+a);
            return s - a;
        } else {
            alert("Solde insuffisant !");
            return;
        }
    }, (err, committed) => { if(committed) alert("Argent envoyé avec succès !"); });
}

// TAXI
function requestTaxi() {
    db.ref('taxi_alerts').push().set({ from: myPhone, name: me.name, time: Date.now() });
    alert("🚕 Recherche de taxi...");
}
function listenTaxi() {
    db.ref('taxi_alerts').on('value', s => {
        const d = document.getElementById('taxi-list'); d.innerHTML = "";
        s.forEach(c => {
            d.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333;">📍 ${c.val().name} <button onclick="startPrivateChat('${c.val().from}','${c.val().name}','${c.key}')" style="width:auto; display:inline; padding:5px;">ACCEPTER</button></div>`;
        });
    });
}

function startPrivateChat(otherPhone, otherName, taxiKey = null) {
    const chatId = "chat_" + Math.min(myPhone.replace(/\D/g,''), otherPhone.replace(/\D/g,'')) + "_" + Math.max(myPhone.replace(/\D/g,''), otherPhone.replace(/\D/g,''));
    db.ref('private_chats/'+chatId).set({ u1: myPhone, u1Name: me.name, u2: otherPhone, u2Name: otherName, active: true });
    if(taxiKey) db.ref('taxi_alerts/'+taxiKey).remove();
}

function openMiniChat(id, title) {
    currentChatId = id;
    document.getElementById('mini-chat').classList.remove('hidden');
    document.getElementById('chat-title').innerText = title;
    db.ref('private_chats/'+id+'/msgs').off();
    db.ref('private_chats/'+id+'/msgs').on('value', s => {
        const d = document.getElementById('mini-msgs'); d.innerHTML = "";
        s.forEach(m => {
            const side = m.val().sender === myPhone ? 'b-me' : 'b-other';
            d.innerHTML += `<div class="bubble ${side}">${m.val().text}</div>`;
        });
        d.scrollTop = d.scrollHeight;
    });
}

function sendMiniMsg() {
    const t = document.getElementById('mini-in').value;
    if(t && currentChatId) db.ref('private_chats/'+currentChatId+'/msgs').push().set({ sender: myPhone, text: t });
    document.getElementById('mini-in').value = "";
}

function closeMiniChat() {
    if(confirm("Finir la discussion ?")) {
        db.ref('private_chats/'+currentChatId).update({ active: false });
        document.getElementById('mini-chat').classList.add('hidden');
    }
}

function openCatalog(t) {
    document.getElementById('modal-catalog').style.display = 'block';
    db.ref('ika'+t).on('value', s => {
        const g = document.getElementById('cat-grid'); g.innerHTML = "";
        s.forEach(c => {
            const v = c.val();
            g.innerHTML += `<div class="item-card">
                <img src="${v.img}" class="item-img">
                <div style="padding:8px; font-size:12px;"><b>${v.n}</b><br><span style="color:var(--gold)">${v.p} F</span><br>
                <button onclick="startPrivateChat('${v.owner}','${v.ownerName}')" style="padding:4px; font-size:10px; margin-top:5px;">COMMANDER</button></div>
            </div>`;
        });
    });
}

function previewFile(i) { const r = new FileReader(); r.onload = e => tempImg = e.target.result; r.readAsDataURL(i.files[0]); }
function uploadItem() {
    const n = document.getElementById('p-title').value, p = document.getElementById('p-price').value;
    db.ref(me.role === 'Restaurant' ? 'ikaeat' : 'ikashop').push().set({ n, p, img: tempImg, owner: myPhone, ownerName: me.name });
    alert("Publié !");
}
function addDebt() {
    const n = document.getElementById('dette-n').value, v = document.getElementById('dette-v').value;
    if(n && v) db.ref('dettes/'+myPhone).push().set({ n, v });
}
function loadDettes() {
    db.ref('dettes/'+myPhone).on('value', s => {
        const d = document.getElementById('dette-list'); d.innerHTML = "";
        s.forEach(c => d.innerHTML += `<div style="background:#222; padding:8px; margin-bottom:4px; border-radius:8px;">${c.val().n}: <b>${c.val().v} F</b> <span onclick="db.ref('dettes/${myPhone}/${c.key}').remove()" style="color:var(--red); float:right;">X</span></div>`);
    });
}

function showMyQR() {
    document.getElementById('modal-qr').style.display = 'block';
    const disp = document.getElementById('qr-display'); disp.innerHTML = "";
    document.getElementById('qr-info').innerText = me.name;
    new QRCode(disp, { text: myPhone, width: 180, height: 180 });
}
function adminMint() { db.ref('users/'+document.getElementById('adm-target').value+'/solde').transaction(s => (s||0)+parseInt(document.getElementById('adm-amt').value)); alert("Fait"); }
function sendMsg() { const m = document.getElementById('chat-in').value; if(m) db.ref('chat_public').push().set({u:me.name, m:m}); document.getElementById('chat-in').value = ""; }
function loadChat() {
    db.ref('chat_public').limitToLast(20).on('value', s => {
        const d = document.getElementById('chat-msgs'); d.innerHTML = "";
        s.forEach(c => d.innerHTML += `<div style="margin-bottom:5px;"><b>${c.val().u}:</b> ${c.val().m}</div>`);
        d.scrollTop = d.scrollHeight;
    });
}
function agentAction(type) {
    const t = document.getElementById('ag-target').value, a = parseInt(document.getElementById('ag-amt').value);
    if(type === 'DEPOT') {
        db.ref('users/'+myPhone+'/solde').transaction(s => s - a);
        db.ref('users/'+t+'/solde').transaction(ts => (ts||0) + a);
    } else {
        db.ref('users/'+t+'/solde').transaction(ts => ts - a);
        db.ref('users/'+myPhone+'/solde').transaction(s => (s||0) + a);
    }
    alert("Opération Agent réussie !");
}
function showTab(t, el) {
    document.getElementById('tab-home').classList.toggle('hidden', t !== 'home');
    document.getElementById('tab-chat').classList.toggle('hidden', t !== 'chat');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
}
</script>
</body>
        </html>
